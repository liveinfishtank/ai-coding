name: iOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show repository files
        run: |
          pwd
          find . -maxdepth 4 -name "*.xcodeproj" -o -name "project.pbxproj"
          ls -la
          ls -la AnatoVision.xcodeproj || true

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun simctl list devices available

      - name: Build and test
        run: |
          xcodebuild \
            -project AnatoVision/AnatoVision.xcodeproj \
            -scheme AnatoVision \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            clean test
